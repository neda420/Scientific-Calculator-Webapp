<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="calculator" aria-label="Scientific calculator">
    <h1>Scientific Calculator</h1>
    <label for="display" class="sr-only">Calculator display</label>
    <input id="display" type="text" readonly aria-live="polite" />
    <p id="mode" aria-live="polite">Mode: RAD</p>
    <p id="status" role="status" aria-live="polite"></p>

    <div class="buttons">
      <button data-action="clear">C</button>
      <button data-action="delete">DEL</button>
      <button id="mode-toggle" data-action="toggle-mode">RAD</button>
      <button data-action="history">HIST</button>
      <button data-value="ANS">ANS</button>
      <button data-value="(">(</button>
      <button data-value=")">)</button>

      <button data-value="sin(">sin</button>
      <button data-value="cos(">cos</button>
      <button data-value="tan(">tan</button>
      <button data-value="asin(">asin</button>
      <button data-value="acos(">acos</button>
      <button data-value="atan(">atan</button>
      <button data-value="log(">log</button>

      <button data-value="ln(">ln</button>
      <button data-value="sqrt(">√</button>
      <button data-value="abs(">abs</button>
      <button data-value="exp(">exp</button>
      <button data-value="fact(">n!</button>
      <button data-value="^">^</button>
      <button data-value="/">÷</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button data-value="*">×</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button data-value="-">−</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button data-value="+">+</button>

      <button data-value="0">0</button>
      <button data-value=".">.</button>
      <button data-value="PI">π</button>
      <button data-value="E">e</button>

      <button class="equals" data-action="evaluate">=</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
